mode: hosted
versioning:
  style: in-place
  backup_before_mutate: false
purpose: "Shared, repo-tracked project memory — one FULL-doc knowledge category committed into the consuming repo"
# This wiki nests by the subject axis; directory-depth limits are intentionally
# NOT enforced (llm-wiki-memory never passes --max-depth, and per-entry
# `max_depth` is omitted). This flag documents that.
ignore_max_depth: true
# repo layout (template) — a SHARED, FULL-doc team wiki.
#
# The layout for a SHARED, repo-owned brain: a single `knowledge` category
# (`ownership: repo`) that lives inside a consuming project and is committed by
# the USER, so teammates who clone the repo inherit its accumulated knowledge.
# Federation mounts this as a wiki root beside the user's private brain; the
# mount's git surfaces (negated .gitignore, personal git, chained
# sync-embeddings hook) are wired by scripts/mount-init.mjs.
#
# FULL leaves (`full: true`). Unlike the private default brain — whose capture
# pipeline distills short, atomic notes — a team wiki holds WHOLE documents
# (design docs, RFCs, runbooks, onboarding guides). `full: true` means every
# leaf here is stored VERBATIM (never shortened) and embedded WHOLE (all of it
# searchable, not just the first ~6 chunks). This is the natural home for
# `absorb` — importing existing markdown files as-is.
#
# Nesting is subject-only, 2 levels: `knowledge/<domain>/<subtopic>/<leaf>`.
# `subject` is the sole `kind: path` facet — its value is an array (or
# "/"-joined string), broad→narrow, one directory segment each, capped at two
# (domain + optional subtopic). Its FIRST segment must be one of the controlled
# `subject_domains` vocabulary below; an absent/out-of-vocab subject collapses
# to the `general` fallback. There is NO atom_type folder in the path (a whole
# document is not a typed atom): with subject the only path facet, every segment
# IS subject, so the path inverts trivially. `atom_type` may still ride along in
# frontmatter for filtering, but it does not shape the tree.
#
# A `vocabulary:` reference is resolved WITHIN this file — there is no cross-file
# inheritance — so the full `subject_domains` block is embedded here verbatim.

# Controlled top-level subject domains (the first `subject` segment) — a
# UNIVERSAL team vocabulary spanning what a shared project brain accumulates,
# not just dev tooling. Curate this list for your team; `validate-layout`
# enforces references to it.
vocabularies:
  subject_domains:
    - architecture   # system design, services, data flow, lifecycle, patterns
    - product        # product areas, features, domain/business logic, requirements
    - operations     # running the system: deploys, incidents, runbooks, on-call, monitoring
    - data           # databases, storage, schemas, pipelines, analytics
    - security       # auth, secrets, compliance, threat models, access
    - process        # ways-of-working: workflow, planning, conventions, rituals
    - onboarding     # getting started, environment setup, team orientation
    - integrations   # external systems, APIs, third-party services, contracts
    - decisions      # architecture/design decision records and their rationale
    - reference      # standing reference material, glossaries, links, specs
    - general        # fallback when no domain fits

# Per-category consolidate eligibility (REQUIRED — no defaults). See
# examples/layouts/default/layout.yaml for the full semantics. A shared repo
# brain is curated by its committers, so consolidation is left OFF (`none`).

layout:
  - path: knowledge
    purpose: "shared, repo-tracked, WHOLE-document knowledge; nested subject-first by <domain>/<subtopic>"
    full: true
    placement_facets: [subject]
    facet_rules:
      subject: { kind: path, vocabulary: subject_domains, fallback: general }
    allow_entry_types: [primary]
    # Checked into the consuming repo and committed by the USER; the engine
    # never git-commits a repo-owned category (R11).
    ownership: repo
    consolidate: none

mode: hosted
versioning:
  style: in-place
  backup_before_mutate: false
purpose: "Persistent local memory for the agent across sessions"
# tracker-issues layout (template).
#
# Extends the default 5 categories with an `issues` category storing knowledge
# and plan leaves for tracker-system issues (Jira, GitHub, Linear, ZenDesk, or
# anything with a "{PREFIX}-{N}" key shape). Path computation is DECLARED
# entirely in this YAML via `path_compiler` (sandboxed inline JS), so the
# digit-bucket math below is part of the layout's contract — not hidden in a
# language helper. See examples/layouts/PROTOCOL.md for the full schema.
layout:
  - path: knowledge
    purpose: "long-lived facts, decisions, lore, and gotchas; nested by area/atom_type"
    placement_facets: [area, atom_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: self_improvement
    purpose: "self-improvement lessons; nested by area/task_type (dedup keyed by error_pattern)"
    placement_facets: [area, task_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: plans
    purpose: "approved and in-flight plans; nested by area"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: investigations
    purpose: "investigation and analysis artefacts; nested by area"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: daily
    purpose: "raw captured memory atoms, nested by capture date (yyyy/mm/dd)"
    placement_strategy: daily-date
    allow_entry_types: [primary]
    max_depth: 5
  - path: issues
    placement_facets: []
    allow_entry_types: [primary]
    max_depth: 8
    topology:
      strategy: caller_path
      helper:
        module: scripts/lib/topology-runtime.mjs
        package: llm-wiki-memory
        schema_version: 1
      file_kinds:
        knowledge:
          required_facets: [tracker, prefix, number]
          # Forward: facets -> relative path. Inline JS, sandboxed (no
          # require/process/fs; only Math/String/Number/Array/Object/JSON/
          # RegExp/Date in scope). Either a named function declaration
          # (`function path_template(facets) { return ... }`) or an arrow
          # expression — both are accepted.
          path_compiler: |
            function path_template({ tracker, prefix, number }) {
              const n = Number(number);
              const thousands = Math.floor(n / 1000);
              const hundredsTens = Math.floor((n % 1000) / 10);
              const units = n % 10;
              return `issues/${tracker}/${prefix}/${thousands}/${hundredsTens}/${units}/${prefix}-${n}.md`;
            }
          # Reverse: relative path -> facets, or null if it doesn't match.
          parse_compiler: |
            function parse_template(relPath) {
              const m = /^issues\/([^/]+)\/([^/]+)\/(\d+)\/(\d+)\/(\d+)\/[^/]+-(\d+)\.md$/.exec(relPath);
              if (!m) return null;
              return {
                tracker: m[1],
                prefix: m[2],
                number: parseInt(m[6], 10),
              };
            }
        plan:
          required_facets: [tracker, prefix, number, lifecycle, slug]
          enums:
            lifecycle: [pending, in-progress, done, archived]
          path_compiler: |
            function path_template({ tracker, prefix, number, lifecycle, slug }) {
              const n = Number(number);
              const thousands = Math.floor(n / 1000);
              const hundredsTens = Math.floor((n % 1000) / 10);
              const units = n % 10;
              return `issues/${tracker}/${prefix}/${thousands}/${hundredsTens}/${units}/${lifecycle}/${prefix}-${n}-${slug}.plan.md`;
            }
          parse_compiler: |
            function parse_template(relPath) {
              const m = /^issues\/([^/]+)\/([^/]+)\/(\d+)\/(\d+)\/(\d+)\/([^/]+)\/[^/]+-(\d+)-(.+)\.plan\.md$/.exec(relPath);
              if (!m) return null;
              return {
                tracker: m[1],
                prefix: m[2],
                number: parseInt(m[7], 10),
                lifecycle: m[6],
                slug: m[8],
              };
            }
      facet_inputs:
        tracker:
          type: string
          description: "Tracker system name, used verbatim as a directory segment (e.g. JIRA, GITHUB, LINEAR)"
        prefix:
          type: string
          description: "Tracker-specific project key (Jira project, github org-repo slug, etc.)"
        number:
          type: integer
          minimum: 1
        lifecycle:
          type: string
          description: "Plan file lifecycle state; constrained by the enum above"
        slug:
          type: string
          pattern: "^[A-Za-z0-9-]+$"
          description: "Plan title slug; used to disambiguate multiple plans per issue"

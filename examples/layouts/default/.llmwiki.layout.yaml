mode: hosted
versioning:
  style: in-place
  backup_before_mutate: false
purpose: "Persistent local memory for the agent across sessions"
# Default layout (template).
#
# This is the baseline 5-category topology that ships with llm-wiki-memory:
#   knowledge        -> knowledge/<area>/<atom_type>/
#   self_improvement -> self_improvement/<area>/<task_type>/
#   plans            -> plans/<area>/
#   investigations   -> investigations/<area>/
#   daily            -> daily/<yyyy>/<mm>/<dd>/
#
# Missing-facet sentinels: area -> "unscoped", task_type -> "unknown",
# atom_type -> "untyped" (atom_type is normally always set; "untyped" only
# appears for a malformed legacy leaf during migration).
#
# Use this template for a fresh install with no custom topology requirements.
# Layer additional categories on top (see examples/layouts/tracker-issues/)
# when your workspace needs them.
layout:
  - path: knowledge
    purpose: "long-lived facts, decisions, lore, and gotchas; nested by area/atom_type"
    placement_facets: [area, atom_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: self_improvement
    purpose: "self-improvement lessons; nested by area/task_type (dedup keyed by error_pattern)"
    placement_facets: [area, task_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: plans
    purpose: "approved and in-flight plans; nested by area"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: investigations
    purpose: "investigation and analysis artefacts; nested by area"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: daily
    purpose: "raw captured memory atoms, nested by capture date (yyyy/mm/dd)"
    placement_strategy: daily-date
    allow_entry_types: [primary]
    max_depth: 5

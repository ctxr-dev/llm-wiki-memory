mode: hosted
versioning:
  style: in-place
  backup_before_mutate: false
purpose: "Persistent local memory for the agent across sessions"
# Layout rule (enforced in code by scripts/lib/wiki-store.mjs placementDir, and by
# scripts/migrate-nest.mjs for pre-existing leaves): every category is NESTED, never
# a flat pile in the category root. Non-daily categories nest by the SAME metadata
# facets the store is searched by (so browsing the tree mirrors searching it); daily
# nests by capture date. Do NOT topically re-cluster these wikis; re-nest
# deterministically with `node scripts/cli.mjs nest`.
#   knowledge        -> knowledge/<project_module>/<atom_type>/
#   self_improvement -> self_improvement/<project_module>/<task_type>/
#   plans            -> plans/<project_module>/
#   investigations   -> investigations/<project_module>/
#   daily            -> daily/<yyyy>/<mm>/<dd>/
# Missing-facet sentinels: project_module -> "unscoped", task_type -> "unknown",
# atom_type -> "untyped" (atom_type is normally always set, so "untyped" only
# appears for a malformed legacy leaf during migration).
#
# This YAML is the source of truth for CATEGORIES and per-category facets. Each
# entry has:
#   - path                : the top-level dir name under the wiki root (required)
#   - placement_facets    : ordered list of memory.<key> fields the leaf nests
#                           under; omit to keep the baked-in default for the
#                           historical 4 facet categories (knowledge,
#                           self_improvement, plans, investigations). For a NEW
#                           category, omit to make the category flat under its
#                           root, or set explicitly. Use placementOverride on
#                           writeMemory / `path` on the MCP tools to bypass facet
#                           derivation entirely for a single write (custom
#                           topologies like Jira issue trees).
#   - placement_strategy  : optional; `daily-date` is the only recognised value
#                           today (used for `daily`, which nests by capture date
#                           rather than facets). Setting this on another category
#                           is a no-op for now.
#   - allow_entry_types   : forwarded to skill-llm-wiki validate
#   - max_depth           : forwarded to skill-llm-wiki validate
#   - topology            : optional STRUCTURED declaration for a custom-topology
#                           category (see scripts/lib/topologies/*.mjs helpers).
#                           Schema:
#                             strategy: caller_path | (future strategies)
#                             helper:
#                               module: relative path to the JS helper exporting
#                                       loadTopology / pathFor / parsePath
#                               package: npm package name when imported externally
#                               schema_version: integer
#                             file_kinds.<kind>:
#                               required_facets: list of facet keys callers MUST
#                                                supply in metadata
#                               enums.<facet>: optional list of allowed values
#                               path_template: string with "{var}" placeholders;
#                                              substituted with facet values +
#                                              helper-derived facets
#                             facet_inputs.<facet>: { type, minimum, pattern }
#                                                   contract per facet
#                           Default behaviour is unchanged when `topology` is absent.
layout:
  - path: knowledge
    purpose: "long-lived facts, decisions, lore, and gotchas; nested by project_module/atom_type"
    placement_facets: [area, atom_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: self_improvement
    purpose: "self-improvement lessons; nested by project_module/task_type (dedup keyed by error_pattern)"
    placement_facets: [area, task_type]
    allow_entry_types: [primary]
    max_depth: 5
  - path: plans
    purpose: "approved and in-flight plans; nested by project_module"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: investigations
    purpose: "investigation and analysis artefacts; nested by project_module"
    placement_facets: [area]
    allow_entry_types: [primary]
    max_depth: 5
  - path: daily
    purpose: "raw captured memory atoms, nested by capture date (yyyy/mm/dd)"
    placement_strategy: daily-date
    allow_entry_types: [primary]
    max_depth: 5

# llm-wiki-memory canonical settings.
#
# Rendered to <data>/settings/settings.yaml by bootstrap.sh on first install,
# preserved + auto-migrated thereafter (delete to regenerate from this template).
# Read by scripts/lib/settings.mjs.
#
# Two surfaces:
#   - This file: application config (consolidate / flush / hook / embed /
#     recall / compile / gc / gate / providers). The source of truth for
#     everything that isn't a secret / deployment path / provider switch.
#   - <data>/settings/.env: secrets (API keys), provider switches (CHOICE of
#     provider, model, base URL, timeout), deployment paths (DATA_DIR,
#     SETTINGS_PATH, EMBED_CACHE), workspace identity, test seams.
#
# Only the STRICT subset in .env supports env-var overrides. Setting
# MEMORY_CONSOLIDATE_COSINE_THRESHOLD in your shell is silently IGNORED —
# the canonical place is `consolidate.cosineThreshold:` below. This is a
# deliberate breaking change from earlier versions; the upgrade runbook at
# docs/releases/2026/06/03/v2/update-prompt.md migrates an old install.

consolidate:
  # Master switch for ALL consolidation (a.k.a. reconciliation). false (default)
  # = opt-in: consolidateMemory() is a no-op in EVERY path — the hourly cron,
  # `cli.mjs consolidate`, the MCP `consolidate_memory` tool, and the hook-less
  # `consolidate` skill. The hourly cron (compile + consolidate) also no-ops.
  # `force` does NOT override this — set true here to enable. Manual
  # `cli.mjs compile` is unaffected.
  enabled: false
  # Cadence (days) for the throttled consolidate orchestrator. 0/off disables.
  intervalDays: 1
  # Cosine threshold above which a cluster pair counts as a dedup candidate.
  cosineThreshold: 0.97
  # Same threshold when the embedding backend has fallen back to the lexical
  # hash scorer — scores inflate, so we need a tighter cut to avoid false
  # positives.
  cosineLexicalThreshold: 0.995
  # Per-leaf cluster scope.
  clusterTopK: 12
  clusterScoreThreshold: 0.75
  # Optional LLM-only "merge band": when set (valid range [0.8, cosineThreshold)),
  # cluster pairs scoring at/above this floor but BELOW cosineThreshold are
  # flagged as band candidates. Band candidates are acted on ONLY by the LLM
  # merge pass — if the LLM is unreachable (or the run has LLM passes
  # disabled) a band pair is left alone (both leaves stay active), never
  # deterministically archived. Pairs at/above cosineThreshold keep the
  # established archive-on-LLM-failure behaviour. null/0 disables the band.
  cosineBandFloor: null
  # Lifecycle windows.
  orphanTtlDays: 365
  staleAfterMonths: 6
  archiveBodyMax: 1200
  archiveAgeDays: 30
  # Pass allow-list. Empty / "all" enables every pass; CSV restricts.
  passes: all
  # LLM-driven passes (merge-near-duplicates, semantic-refresh).
  llmPassesEnabled: true
  llmMaxRetries: 2
  refreshMaxPerRun: 25
  # Cron logging + entity-level self-healing.
  # Slim entries kept in state/.consolidate-attempts.log (one per cron run).
  attemptsKeep: 50
  # Days before a sharded full run log (state/logs/yyyy/mm/cron-*.json) is
  # pruned. Issue reports under issues/ are never auto-pruned.
  fullLogRetentionDays: 90
  # Consecutive per-entity failures (while still pending) before the run
  # escalates and writes a skeleton issue report under issues/yyyy/mm/dd/.
  escalateAfterAttempts: 3

flush:
  # Daily slot category (rejected slots fall back to "daily").
  slot: daily
  # Retry budget for the per-chunk distill call inside the worker.
  distillAttempts: 3
  distillRetryMs: 3000
  # Stale-lock TTL for the per-session flush lock (worker that crashed
  # mid-distill has its lock reclaimed after this).
  lockStaleMs: 600000
  # Map-reduce parameters.
  chunkTargetK: 5
  chunkParallelism: 1
  reduceMaxChars: 30000
  # Cap on the raw-fallback leaf body (when distillation fails completely).
  # Default unbounded: the previous 8K cap dropped 72K of context in the
  # 2026-06-02 incident.
  rawFallbackChars: 9007199254740991   # Number.MAX_SAFE_INTEGER
  # When chunks distil at provider:model-N, ask the reduce step at the NEXT
  # entry (one tier stronger) in the same provider's model list. Set to false
  # to keep the reduce step on the same model as the chunks.
  reduceModelPromote: true

hook:
  # Transcript caps before redaction + slicing.
  maxTurns: 30
  maxChars: 80000
  # Per-hook minimum-turn gates (session-end can capture 1-turn windows,
  # pre-compact wants a richer transcript before bothering to distil).
  sessionEndMinTurns: 1
  precompactMinTurns: 5
  # ExitPlanMode auto-capture knobs.
  exitPlanModeDisable: false
  exitPlanModeMaxBytes: 256000

embed:
  # transformers (default, on-device bge-large) | lexical (no model download).
  backend: transformers
  model: Xenova/bge-large-en-v1.5
  # Length-aware recall: a note longer than the model's ~512-token window is
  # split into <=maxChunks pieces and scored by its best piece minus
  # penalty*(pieces-1). Recall-only; short notes and consolidate are unchanged.
  #
  # FULL leaves (a `full: true` category/leaf — whole absorbed documents) use the
  # `full*` knobs instead: fullMaxChunks lifts the cap so the WHOLE doc is embedded
  # (256 ~= 120k tokens; the ceiling only guards a pathological multi-MB file), and
  # fullPenalty is 0 so a long full doc is scored on its best chunk alone and is
  # never buried by the many-chunks penalty (which exists to keep weak ATOMIC notes
  # from out-ranking on length).
  chunk:
    enabled: true
    maxChunks: 6
    penalty: 0.015
    fullMaxChunks: 256
    fullPenalty: 0

recall:
  # A small relevance FLOOR: hits below this cosine are dropped before ranking, so
  # noise-level matches (from any tree) can't be depth-boosted above a strong hit or
  # crowd the results. 0 keeps every hit; tune per embedding backend.
  scoreThreshold: 0.05
  # Cosine proximity within which `priority` (P0/P1/P2) breaks ties at recall.
  # Relevance stays dominant: a hit more than this far below the band leader keeps
  # its cosine rank; only near-equally-relevant hits are ordered P0 > P1 > P2.
  priorityBand: 0.05
  # SessionStart "🧠 Recently" reminder: how many recent days of daily notes to
  # surface as brief + link. 0 disables the reminder.
  recentActivityDays: 3
  # SessionStart plan list: max plans to surface (unfinished preferred). 0 hides plans.
  planContextMax: 2
  # Federated read fan-out: additive per-level ranking boost. A hit's
  # adjustedConfidence = cosine + depth * depthBoostPerLevel, so with the default
  # (>= 1 per level, which exceeds the [0,1] cosine spread) a DEEPER / more-local
  # level's hits outrank a shallower level's ("per-repo memory is more
  # authoritative than the global brain"). 0 disables the boost (pure cosine).
  depthBoostPerLevel: 1
  # The depth boost is BANDED: a hit earns its per-level boost ONLY when its cosine
  # is within depthBoostBand of the best hit for the query. So a COMPARABLY-relevant
  # deeper (repo) hit still outranks the brain, but a clearly-less-relevant deeper
  # hit can't bury a strongly-relevant shallower one. Larger = more boost (toward the
  # old always-boost); 0 = only exact-top-cosine hits are boosted.
  depthBoostBand: 0.15
  # Per-level cap on hits pulled from EACH tree before the fan-out merge.
  searchPerLevelCap: 20

compile:
  # Knowledge slot (the destination compile promotes daily atoms to).
  slot: knowledge
  searchLimit: 5
  atomBodyMaxChars: 700
  qualityStrict: false
  lockStaleMs: 1800000
  metadataRetryLimit: 3

gc:
  # Embedding-cache GC cadence (days). 0/off disables; plain gc-embeddings
  # (no --if-due) always runs regardless.
  intervalDays: 7

gate:
  # The L3 server-side write-gate refusing self_improvement saves without
  # `userRequested:true`. Defence-in-depth; turn off only as an operator
  # escape hatch (L1 instructions + L2 hooks still apply).
  selfImprovementEnabled: true
  # The L2 Claude Code PreToolUse hook (enabled by default). Set false to make
  # the hook a uniform no-op (exit 0, no decision) so Claude Code's normal
  # permission flow applies; L1 instructions + the L3 server gate still apply.
  claudeHookEnabled: true
  # Append a redacted audit record for every gated-category decision (accepted,
  # refused, and the L2 hook's allow/ask) to state/.save-gate-audit.log. Read it
  # with `cli.mjs gate-audit`. Disk-cheap; set false to stop recording.
  auditTrailEnabled: true
  # Per-lesson consent (L2 Claude Code hook). When true, one save phrase in a
  # user turn auto-allows only the FIRST gated write; each subsequent gated write
  # in the same turn prompts one-click, so a session-end flush can no longer ride
  # a single approval. Set false for the legacy turn-level behaviour. Enforced on
  # Claude Code only; other clients rely on L1 discipline + the audit trail.
  perLessonConsent: true
  # Max records kept in the audit log; older lines are front-truncated.
  auditKeep: 1000

wiki:
  # Auto-commit every wiki change to the wiki's OWN git repo: one commit per
  # logical operation (an MCP save, a flush capture, a compile run, a
  # consolidate run), with the touched leaves + reasons in the commit body.
  # Best-effort and silent: no-op when <wiki>/.git is absent or the wiki dir
  # is not its own repo toplevel (so it can never commit into your project).
  autoCommit: true

# Provider chain + per-provider model fallback lists.
providers:
  # Tried head-to-tail when MEMORY_LLM_PROVIDER (env) isn't set. EMPTY here
  # → the loader auto-detects from environment (API keys present, CLIs on
  # PATH) in priority order anthropic → openai → claude → codex → cursor.
  # Uncomment + reorder to override.
  chain: []
  # chain:
  #   - anthropic
  #   - openai
  #   - claude
  #   - codex
  #   - cursor

  # API providers: models[] tried newest-first on model_not_found / 404.
  anthropic:
    models:
      - claude-haiku-4-5
      - claude-sonnet-4-6
      - claude-opus-4-7
  openai:
    models:
      - gpt-5-mini
      - gpt-5
      - gpt-4o-mini
  openai-compatible:
    models:
      - gpt-5-mini
      - gpt-5
      - gpt-4o-mini

  # CLI providers: defer to whatever their binary is logged into; lists kept
  # empty so the dispatcher passes no --model flag.
  claude: { models: [] }
  codex: { models: [] }
  cursor: { models: [] }

# Workspace-wide tweaks.
crossCuttingAreas: []   # comma-separated when set via legacy env; here a YAML list.
